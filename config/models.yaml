models:
  - id: "claude"
    label: "Claude (Anthropic)"
    provider: "anthropic"
    model: "claude-sonnet-4-6"
  - id: "gpt"
    label: "GPT (OpenAI)"
    provider: "openai"
    model: "gpt-4o"
  - id: "gemini"
    label: "Gemini (Google)"
    provider: "openai_compatible"
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
    model: "gemini-2.5-flash"
    api_key_env: "GEMINI_API_KEY"
defaults:
  generators: ["claude"]
  judge: "claude"
